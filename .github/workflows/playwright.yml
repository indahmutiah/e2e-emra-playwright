name: Emra Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
  workflow_dispatch:

jobs:

  build_docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      docker_image: ${{ steps.set_output.outputs.image }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t indahmutiah/my-playwright-autotest:test001 .

      - name: Push Image
        run: |
          docker push indahmutiah/my-playwright-autotest:test001

      - name: Set Output
        id: set_output
        run: echo "image=indahmutiah/my-playwright-autotest:test001" >> $GITHUB_OUTPUT


  autotest:
    name: 🧪 Run Playwright Testing
    runs-on: ubuntu-latest
    needs: build_docker

    container:
      image: ${{ needs.build_docker.outputs.docker_image }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/