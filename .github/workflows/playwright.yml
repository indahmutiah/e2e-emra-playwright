name: Emra Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
  workflow_dispatch:

jobs:

  build_and_test:
    name: 🚀 Build Docker & Run Playwright
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: indahmutiah/my-playwright-autotest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔐 Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 🐳 Build Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:autotest001

      # 🚀 Push Image
      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:autotest001

      # 🧪 Run Playwright pakai image tadi
      - name: Run Playwright Tests (via Docker)
      - run: |
          docker run --rm \
            -e BASE_URL=${{ secrets.BASE_URL }} \
            -e EMAIL=${{ secrets.EMAIL }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            $IMAGE_NAME:${{ github.sha }} \
            npx playwright test

      # 📦 Upload report
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/