name: Emra Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
  workflow_run:
    workflows: ["Build Base Docker Image"]
    types:
      - completed

jobs:
  code_analyze:
    runs-on: ubuntu-latest
    name: 🔍 Code Quality Check (ESLint)
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

  build_docker:
    name: 🐳 Build Custom Docker Image
    runs-on: ubuntu-latest
    needs: code_analyze

    outputs:
      docker_image: ${{ steps.set_output.outputs.image }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t indahmutiah/my-playwright-autotest:${{ github.sha }} .
          docker tag indahmutiah/my-playwright-autotest:${{ github.sha }} indahmutiah/my-playwright-autotest:latest

      - name: Push Image
        run: |
          docker push indahmutiah/my-playwright-autotest:${{ github.sha }}
          docker push indahmutiah/my-playwright-autotest:latest

      - name: Set Output
        id: set_output
        run: echo "image=indahmutiah/my-playwright-autotest:${{ github.sha }}" >> $GITHUB_OUTPUT

  autotest:
    name: 🧪 Run Playwright Test
    runs-on: ubuntu-latest
    needs: build_docker

    container:
      image: ${{ needs.build_docker.outputs.docker_image }}

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - uses: actions/checkout@v4
    
      - name: Run tests
        run: npx playwright test