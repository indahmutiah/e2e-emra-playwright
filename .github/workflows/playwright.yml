name: Emra Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
  workflow_dispatch:

jobs:

  build_docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      docker_image: ${{ steps.set_output.outputs.image }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t indahmutiah/my-playwright-autotest:test001 .

      - name: Push Image
        run: |
          docker push indahmutiah/my-playwright-autotest:test001

      - name: Set Output
        id: set_output
        run: echo "image=indahmutiah/my-playwright-autotest:test001" >> $GITHUB_OUTPUT


  autotest:
    name: 🧪 Run Playwright Testing
    runs-on: ubuntu-latest
    needs: build_docker

    container:
      image: ${{ needs.build_docker.outputs.docker_image }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
  
  send-report:
    send_telegram_report:
    name: 📲 Send Telegram Report
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: automation_test
    if: always()

    container:
      image: alpine:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: apk add --no-cache curl

      - name: Send Test Result to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}

        run: |
          if [ "${{ needs.automation_test.result }}" = "success" ]; then
            STATUS="✅ PASSED"
          else
            STATUS="❌ FAILED"
          fi

          MESSAGE="*Playwright Test Report*
Status: $STATUS
Repo: $GITHUB_REPOSITORY
Branch: $GITHUB_REF_NAME
Actor: $GITHUB_ACTOR
Run:
$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d text="$MESSAGE" \
          -d parse_mode="Markdown"